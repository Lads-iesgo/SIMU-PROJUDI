{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>{% block title %}Simulador-Projudi{% endblock %}</title>

    <!-- Tailwind CSS para estilização idêntica -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para os ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'tjgo-navy': '#153a61', /* Cor do cabeçalho principal */
                        'tjgo-blue': '#1a5b9e', /* Cor de botões primários e links */
                        'tjgo-light-blue': '#226bb8', /* Cor hover de botões */
                        'tjgo-gray-bg': '#f4f4f4', /* Fundo geral da página */
                        'tjgo-gray-card': '#e9e9e9', /* Fundo dos cartões e menus fechados */
                        'tjgo-gray-card-hover': '#dedede', /* Hover do menu fechado (referência imagem 3) */
                        'tjgo-gray-border': '#d1d1d1',
                        'tjgo-text-main': '#333333',
                        'tjgo-text-light': '#666666',
                    },
                    fontFamily: {
                        sans: ['Arial', 'Helvetica', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilos adicionais finos para replicação exata */
        body { background-color: #f7f7f7; }
        .main-container { max-width: 1200px; margin: 0 auto; background-color: white; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .top-bar-icon { font-size: 14px; margin-left: 12px; cursor: pointer; }
        
        /* Ícones customizados simbolizando imagens específicas */
        .icon-sessao-virtual {
            display: flex; justify-content: center; align-items: center;
            width: 100px; height: 70px; background-color: #2c6eb5; color: white;
            border-radius: 4px; font-size: 40px; border: 3px solid #143d6b;
            position: relative;
        }
        .icon-sessao-virtual::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 5px; background-color: #143d6b; border-radius: 2px;
        }

        /* Estilização específica do Accordion (Informações Importantes) */
        .accordion-item-closed {
            background-color: #e8e8e8;
            color: #1a5b9e;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: bold;
            border-bottom: 2px solid white;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            transition: background-color 0.2s;
        }
        .accordion-item-closed:hover { background-color: #dcdcdc; } /* Efeito da Imagem 3 */
        .accordion-item-closed i { font-size: 10px; margin-right: 6px; color: #1a5b9e; }
        
        .input-group-icon {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #555; font-size: 14px;
        }
        
        /* Estilização do rodapé */
        .footer {
            background-color: #153a61;
            color: #b8c5d6;
            padding: 20px 0;
            margin-top: 40px;
            border-top: 3px solid #1a5b9e;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }
        .footer-badge {
            display: inline-block;
            background-color: #e67e22;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-left: 8px;
        }
        @media (max-width: 768px) {
            .footer-content {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body class="text-tjgo-text-main font-sans text-sm antialiased">
    {% block content %}
        <!-- Conteúdo específico de cada página será inserido aqui -->
    {% endblock %}
    
    <!-- Rodapé -->
    <footer class="footer">
        <div class="footer-content">
            <div>
                <i class="fa-solid fa-graduation-cap mr-1"></i>
                <strong>Simulador Universitário Projudi</strong> | Faculdade IESGO
            </div>
            <div>
                <span class="footer-badge">Em Desenvolvimento</span>
            </div>
        </div>
    </footer>
</body>
</html>
